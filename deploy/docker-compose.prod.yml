##
## Production PostgreSQL — sadece veritabanı
## Kullanım: docker compose -f deploy/docker-compose.prod.yml up -d
##

services:
  postgres:
    image: postgres:16-alpine
    container_name: setmobile-db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-setmobile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-setmobile}
    ports:
      - "127.0.0.1:5432:5432"   # sadece localhost'a aç, dışarıya değil
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-setmobile} -d ${POSTGRES_DB:-setmobile}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    driver: local
