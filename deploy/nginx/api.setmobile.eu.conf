##
## api.setmobile.eu  →  NestJS Backend (port 3000)
##

server {
    listen 80;
    listen [::]:80;
    server_name api.setmobile.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.setmobile.eu;

    ssl_certificate     /etc/letsencrypt/live/api.setmobile.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.setmobile.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Socket.io / GPS telemetry)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    add_header X-Content-Type-Options "nosniff";

    location ~ /\. { deny all; }
}
