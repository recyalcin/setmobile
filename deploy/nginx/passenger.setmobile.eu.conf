##
## passenger.setmobile.eu  →  React Passenger App (static SPA)
## /var/www/setmobile/dist/passenger
##

server {
    listen 80;
    listen [::]:80;
    server_name passenger.setmobile.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name passenger.setmobile.eu;

    ssl_certificate     /etc/letsencrypt/live/passenger.setmobile.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/passenger.setmobile.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/setmobile/dist/passenger;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location ~ /\. { deny all; }
}
