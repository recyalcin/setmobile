##
## sm1.setmobile.eu  →  PHP Company Dashboard
## /var/www/setmobile/apps/company
##

server {
    listen 80;
    listen [::]:80;
    server_name sm1.setmobile.eu;

    # Certbot will add SSL block here after: certbot --nginx -d sm1.setmobile.eu
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sm1.setmobile.eu;

    ssl_certificate     /etc/letsencrypt/live/sm1.setmobile.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sm1.setmobile.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/setmobile/apps/company;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # ── URL rewriting: /module/xxx → index.php?route=module/xxx ────────────
    location = /login {
        rewrite ^ /index.php?route=module/login last;
    }

    location ^~ /module/ {
        rewrite ^/module/(.+)$ /index.php?route=module/$1 last;
    }

    location ^~ /admin/ {
        rewrite ^/admin/(.+)$ /index.php?route=admin/$1 last;
    }

    location ^~ /inc/logout.php {
        try_files $uri =404;
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ── Static assets (css, js, images) ────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── PHP handler ─────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_param  PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    # ── Default: everything goes to index.php ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?route=$request_uri&$query_string;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── Deny access to hidden files ─────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
