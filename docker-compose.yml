services:
  postgres:
    image: postgres:16-alpine
    container_name: setmobile-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: setmobile
      POSTGRES_PASSWORD: setmobile2025
      POSTGRES_DB: setmobile
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setmobile -d setmobile"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: setmobile-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@setmobile.local
      PGADMIN_DEFAULT_PASSWORD: setmobile2025
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
